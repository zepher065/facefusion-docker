services:
 facefusion-cuda:
  container_name: facefusion
  restart: unless-stopped
  runtime: nvidia
  build:
   context: .
   dockerfile: Dockerfile.cuda
  command: [ 'python', 'facefusion.py', 'run', '--execution-providers', 'cuda' ]
  volumes:
  - .assets:/facefusion/.assets
  - .caches:/facefusion/.caches
  - .jobs:/facefusion/.jobs
  ports:
  - 7870:7860
  deploy:
    resources:
      reservations:
	    devices:
		  - driver: nvidia
		    capabilities: [all]
